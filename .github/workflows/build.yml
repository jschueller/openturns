on:
  push:
  pull_request:
jobs:
  macos:
    runs-on: macos-latest
    env:
      LDFLAGS: -L/usr/local/opt/openblas/lib
      CPPFLAGS: -I/usr/local/opt/openblas/include
    steps:
    - uses: actions/checkout@v4
    - run: brew install dlib
    - run: cat /usr/local/Cellar/dlib/19.24.2/lib/cmake/dlib/dlib.cmake
    - run: |
        git clone -b v19.24.2 https://github.com/davisking/dlib.git
        cmake -B dlib/build -DDLIB_USE_BLAS=ON -DDLIB_USE_LAPACK=ON -DDLIB_NO_GUI_SUPPORT=ON -DBUILD_SHARED_LIBS=ON dlib
        cmake --build dlib/build --target install --parallel 3
    - run: cat /usr/local/lib/cmake/dlib/dlib.cmake
    - run: diff -ur /usr/local/Cellar/dlib/19.24.2/lib/cmake/dlib/dlib.cmake /usr/local/lib/cmake/dlib/dlib.cmake
    - run: |
        cmake \
        -DCMAKE_UNITY_BUILD=ON -DCMAKE_UNITY_BUILD_BATCH_SIZE=32 -DBUILD_PYTHON=OFF .
        make install -j3 VERBOSE=1
        make t_Dlib_std
        OPENTURNS_NUM_THREADS=2 OMP_NUM_THREADS=1 ctest -R Dlib_std -j3 --output-on-failure --timeout 100 --schedule-random
